asyncapi: 2.6.0
info:
  title: inter-agent protocol
  version: 0.1.0
  description: >
    Minimal universal-friendly protocol for inter-agent bus. Handshake
    capabilities are JSON objects: clients declare optional known or extension
    keys in `hello`, and the server advertises supported baseline capabilities
    in `welcome`. Unknown client capability keys may be ignored.
channels:
  /:
    publish:
      message:
        oneOf:
          - $ref: '#/components/messages/Hello'
          - $ref: '#/components/messages/Send'
          - $ref: '#/components/messages/Broadcast'
          - $ref: '#/components/messages/Ping'
          - $ref: '#/components/messages/Bye'
          - $ref: '#/components/messages/List'
          - $ref: '#/components/messages/Custom'
    subscribe:
      message:
        oneOf:
          - $ref: '#/components/messages/Welcome'
          - $ref: '#/components/messages/Msg'
          - $ref: '#/components/messages/Pong'
          - $ref: '#/components/messages/Error'
          - $ref: '#/components/messages/ListOk'
components:
  schemas:
    Envelope:
      $ref: './schemas/envelope.json'
    Hello:
      $ref: './schemas/hello.json'
    Welcome:
      $ref: './schemas/welcome.json'
    Send:
      $ref: './schemas/send.json'
    Broadcast:
      $ref: './schemas/broadcast.json'
    Ping:
      $ref: './schemas/ping.json'
    Pong:
      $ref: './schemas/pong.json'
    Bye:
      $ref: './schemas/bye.json'
    Msg:
      $ref: './schemas/msg.json'
    Error:
      $ref: './schemas/error.json'
    List:
      $ref: './schemas/list.json'
    ListOk:
      $ref: './schemas/list_ok.json'
    Custom:
      $ref: './schemas/custom.json'
  messages:
    Hello:
      payload:
        $ref: '#/components/schemas/Hello'
    Welcome:
      payload:
        $ref: '#/components/schemas/Welcome'
    Send:
      payload:
        $ref: '#/components/schemas/Send'
    Broadcast:
      payload:
        $ref: '#/components/schemas/Broadcast'
    Ping:
      payload:
        $ref: '#/components/schemas/Ping'
    Pong:
      payload:
        $ref: '#/components/schemas/Pong'
    Bye:
      payload:
        $ref: '#/components/schemas/Bye'
    Msg:
      payload:
        $ref: '#/components/schemas/Msg'
    Error:
      payload:
        $ref: '#/components/schemas/Error'
    List:
      payload:
        $ref: '#/components/schemas/List'
    ListOk:
      payload:
        $ref: '#/components/schemas/ListOk'
    Custom:
      payload:
        $ref: '#/components/schemas/Custom'
